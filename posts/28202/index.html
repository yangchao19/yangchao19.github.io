],[<span class="number">1</span>,<span class="number">3</span>],[<span class="number">1</span>,<span class="number">4</span>]])  </span><br><span class="line">c.shape  </span><br><span class="line"><span class="comment">#(4, 2)  </span></span><br><span class="line">c.shape[<span class="number">0</span>]  </span><br><span class="line"><span class="comment">#4  </span></span><br><span class="line">c.shape[<span class="number">1</span>]  </span><br><span class="line"><span class="comment">#2</span></span><br><span class="line">                 </span><br><span class="line">a = np.zeros((m,n))</span><br><span class="line">	返回元素全为<span class="number">0</span>，大小为m*n的矩阵</span><br><span class="line">[a,b] = np.polyfit(x,y,deg)</span><br><span class="line">	y = a*x**deg+b 线性回归</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">	</span><br></pre></td></tr></tbody></table></figure>
